<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>File Upload System - Sealed Auction Platform</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Advanced file upload with drag-and-drop, progress tracking, and preview">
    <meta name="theme-color" content="#667eea">
    <meta name="background-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="File Upload">
    <meta name="application-name" content="Auction Platform">
    <meta name="msapplication-TileColor" content="#667eea">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384x384.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .upload-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        
        .upload-zone.dragover {
            border-color: #667eea;
            background-color: #f0f4ff;
            transform: scale(1.02);
        }
        
        .upload-zone.uploading {
            border-color: #10b981;
            background-color: #f0fdf4;
        }
        
        .upload-zone.error {
            border-color: #ef4444;
            background-color: #fef2f2;
        }
        
        .file-item {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        .preview-image {
            object-fit: cover;
            transition: transform 0.2s ease;
        }
        
        .preview-image:hover {
            transform: scale(1.05);
        }
        
        .file-icon {
            font-size: 3rem;
            color: #64748b;
        }
        
        .retry-button {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .upload-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .toast-notification {
            animation: toastSlide 0.3s ease;
        }
        
        @keyframes toastSlide {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-upload text-blue-600 text-2xl mr-3"></i>
                    <h1 class="text-xl font-semibold text-gray-900">File Upload System</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="clearAllBtn" class="text-gray-500 hover:text-gray-700 transition">
                        <i class="fas fa-trash-alt mr-2"></i>Clear All
                    </button>
                    <button id="retryAllBtn" class="text-blue-600 hover:text-blue-700 transition">
                        <i class="fas fa-redo mr-2"></i>Retry Failed
                    </button>
                    <button id="uploadAllBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>Upload All
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Upload Statistics -->
        <div class="upload-stats text-white rounded-lg p-6 mb-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center">
                    <div id="totalFiles" class="text-3xl font-bold">0</div>
                    <div class="text-sm opacity-90">Total Files</div>
                </div>
                <div class="text-center">
                    <div id="uploadedFiles" class="text-3xl font-bold">0</div>
                    <div class="text-sm opacity-90">Uploaded</div>
                </div>
                <div class="text-center">
                    <div id="failedFiles" class="text-3xl font-bold">0</div>
                    <div class="text-sm opacity-90">Failed</div>
                </div>
                <div class="text-center">
                    <div id="totalSize" class="text-3xl font-bold">0 MB</div>
                    <div class="text-sm opacity-90">Total Size</div>
                </div>
            </div>
        </div>

        <!-- Upload Zone -->
        <div id="uploadZone" class="upload-zone bg-white rounded-lg p-12 text-center mb-8 cursor-pointer">
            <div class="max-w-md mx-auto">
                <i class="fas fa-cloud-upload-alt text-6xl text-gray-400 mb-4"></i>
                <h2 class="text-2xl font-semibold text-gray-900 mb-2">
                    Drop files here or click to browse
                </h2>
                <p class="text-gray-600 mb-4">
                    Support for images, documents, and archives. Maximum file size: 10MB per file.
                </p>
                <button id="browseBtn" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                    <i class="fas fa-folder-open mr-2"></i>Choose Files
                </button>
                <input type="file" id="fileInput" multiple class="hidden" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.rar">
            </div>
        </div>

        <!-- Upload Queue -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-900">
                        <i class="fas fa-list mr-2"></i>Upload Queue
                    </h3>
                    <div class="flex items-center space-x-4">
                        <select id="filterSelect" class="border border-gray-300 rounded-md px-3 py-1 text-sm">
                            <option value="all">All Files</option>
                            <option value="pending">Pending</option>
                            <option value="uploading">Uploading</option>
                            <option value="completed">Completed</option>
                            <option value="failed">Failed</option>
                        </select>
                        <button id="pauseBtn" class="text-gray-500 hover:text-gray-700 transition">
                            <i class="fas fa-pause mr-1"></i>Pause
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="fileQueue" class="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                <!-- File items will be added here -->
                <div class="p-8 text-center text-gray-500">
                    <i class="fas fa-inbox text-4xl mb-3"></i>
                    <p>No files in queue. Drop files above to get started.</p>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="bg-white rounded-lg shadow mt-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">
                    <i class="fas fa-cog mr-2"></i>Upload Settings
                </h3>
            </div>
            <div class="p-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Maximum File Size
                        </label>
                        <select id="maxFileSize" class="w-full border border-gray-300 rounded-md px-3 py-2">
                            <option value="5">5 MB</option>
                            <option value="10" selected>10 MB</option>
                            <option value="25">25 MB</option>
                            <option value="50">50 MB</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Concurrent Uploads
                        </label>
                        <select id="concurrentUploads" class="w-full border border-gray-300 rounded-md px-3 py-2">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Auto Retry Failed Uploads
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="autoRetry" checked class="mr-2">
                            <span class="text-sm">Enable automatic retry</span>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Generate Image Previews
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="generatePreviews" checked class="mr-2">
                            <span class="text-sm">Enable preview generation</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2">
        <!-- Toast notifications will appear here -->
    </div>

    <!-- Hidden file input for mobile -->
    <input type="file" id="mobileFileInput" multiple class="hidden" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.rar">

    <script src="file-upload.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
