<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Auction Platform</title>
    
    <!-- Scripts and Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/emoji-picker/1.0.0/emoji-picker.min.css">
    
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-tertiary: #718096;
            --accent: #667eea;
            --accent-hover: #5a67d8;
            --border: #e2e8f0;
            --online: #48bb78;
            --offline: #a0aec0;
            --typing: #f6ad55;
        }

        [data-theme="dark"] {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #4a5568;
            --text-primary: #f7fafc;
            --text-secondary: #e2e8f0;
            --text-tertiary: #a0aec0;
            --accent: #667eea;
            --accent-hover: #5a67d8;
            --border: #4a5568;
            --online: #48bb78;
            --offline: #a0aec0;
            --typing: #f6ad55;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: var(--bg-primary);
        }

        .chat-input-container {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .message.own {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            background-color: var(--bg-tertiary);
            padding: 0.75rem;
            border-radius: 0.75rem;
            position: relative;
        }

        .message.own .message-content {
            background-color: var(--accent);
            color: white;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message-info {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .message-text {
            word-wrap: break-word;
        }

        .message-edited {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-style: italic;
            margin-top: 0.25rem;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: var(--bg-tertiary);
            border-radius: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .typing-dots {
            display: flex;
            gap: 0.25rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-tertiary);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--online);
            border: 2px solid var(--bg-primary);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .offline-indicator {
            background-color: var(--offline);
        }

        .participants-sidebar {
            width: 300px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 1rem;
            overflow-y: auto;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .participant:hover {
            background-color: var(--bg-tertiary);
        }

        .participant-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            font-weight: bold;
            position: relative;
        }

        .file-message {
            background-color: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-icon {
            font-size: 2rem;
            color: var(--accent);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .file-size {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .emoji-picker {
            position: absolute;
            bottom: 100%;
            right: 0;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .chat-input-wrapper {
            position: relative;
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: var(--text-primary);
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chat-button {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            height: 44px;
        }

        .chat-button:hover {
            background-color: var(--accent-hover);
        }

        .chat-button:disabled {
            background-color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .file-upload-label {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            height: 44px;
        }

        .file-upload-label:hover {
            background-color: var(--border);
        }

        @media (max-width: 768px) {
            .participants-sidebar {
                display: none;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="flex items-center gap-3">
                <button id="backButton" class="chat-button">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h1 id="roomName" class="text-xl font-bold">Chat Room</h1>
                    <div id="roomStatus" class="text-sm text-gray-500">
                        <span id="onlineCount">0</span> online
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="toggleParticipants" class="chat-button">
                    <i class="fas fa-users"></i>
                </button>
                <button id="themeToggle" class="chat-button">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="flex flex-1 overflow-hidden">
            <!-- Messages Container -->
            <div class="flex-1 flex flex-col">
                <div id="chatMessages" class="chat-messages">
                    <!-- Messages will be loaded here -->
                </div>

                <!-- Typing Indicator -->
                <div id="typingIndicator" class="typing-indicator" style="display: none;">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span id="typingText">Someone is typing...</span>
                </div>

                <!-- Chat Input -->
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <label for="fileUpload" class="file-upload-label">
                            <i class="fas fa-paperclip"></i>
                        </label>
                        <input type="file" id="fileUpload" style="display: none;" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.rar">
                        
                        <textarea 
                            id="messageInput" 
                            class="chat-input" 
                            placeholder="Type a message..."
                            rows="1"
                        ></textarea>
                        
                        <button id="emojiButton" class="chat-button">
                            <i class="fas fa-smile"></i>
                        </button>
                        
                        <button id="sendButton" class="chat-button" disabled>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    
                    <!-- Emoji Picker (hidden by default) -->
                    <div id="emojiPicker" class="emoji-picker" style="display: none;">
                        <!-- Emoji picker content will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Participants Sidebar -->
            <div id="participantsSidebar" class="participants-sidebar">
                <h3 class="font-bold mb-4">Participants</h3>
                <div id="participantsList">
                    <!-- Participants will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="chat.js"></script>
</body>
</html>
