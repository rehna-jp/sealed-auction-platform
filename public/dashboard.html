<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Auction Dashboard</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Personal dashboard for managing auctions, bids, and activity">
    <meta name="theme-color" content="#667eea">
    <meta name="background-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dashboard">
    <meta name="application-name" content="Auction Platform">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384x384.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    
    <!-- Socket.IO for real-time updates -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fallback CSS if Tailwind fails to load -->
    <link rel="stylesheet" href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" onerror="loadFallbackCSS()">
    
    <style>
        /* Basic styles that work without Tailwind */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .auction-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        
        .auction-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.15);
        }
        
        .grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
        .md-grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .md-grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .md-grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .col-span-full { grid-column: 1 / -1; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .text-center { text-align: center; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .font-bold { font-weight: bold; }
        .text-gray-900 { color: #111827; }
        .text-gray-600 { color: #4b5563; }
        .text-green-600 { color: #059669; }
        .text-blue-600 { color: #2563eb; }
        .text-purple-600 { color: #7c3aed; }
        .text-yellow-600 { color: #d97706; }
        .text-red-600 { color: #dc2626; }
        .bg-green-100 { background-color: #dcfce7; }
        .bg-blue-100 { background-color: #dbeafe; }
        .bg-purple-100 { background-color: #f3e8ff; }
        .bg-yellow-100 { background-color: #fef3c7; }
        .bg-red-100 { background-color: #fee2e2; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .p-4 { padding: 1rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-active { color: #059669; }
        .status-closed { color: #dc2626; }
        .status-pending { color: #d97706; }
        
        .activity-feed {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        /* Responsive grid */
        @media (min-width: 768px) {
            .md-grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .md-grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .md-grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        }
        
        @media (min-width: 1024px) {
            .lg-grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
    
    <script>
        function loadFallbackCSS() {
            document.body.classList.add('fallback-styles');
            console.log('Tailwind CSS failed to load, using fallback styles');
        }
        
        // Check if Tailwind is loaded after a delay
        setTimeout(() => {
            if (!window.tailwind) {
                loadFallbackCSS();
            }
        }, 3000);
    </script>
</head>
<body class="bg-gray-50">
    <!-- Skip Navigation Link -->
    <a href="#main-content" class="skip-link sr-only">Skip to main content</a>
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="container">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-gray-900">My Auction Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="createAuctionBtn" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
                        Create Auction
                    </button>
                    <button id="refreshBtn" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition">
                        Refresh
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" role="main" class="container">
        <!-- Statistics Cards -->
        <div class="grid md-grid-cols-4 gap-6 mb-6">
            <div class="card text-center">
                <div class="text-3xl font-bold text-blue-600" id="totalAuctions">-</div>
                <div class="text-gray-600">Total Auctions</div>
            </div>
            <div class="card text-center">
                <div class="text-3xl font-bold text-green-600" id="activeAuctions">-</div>
                <div class="text-gray-600">Active Auctions</div>
            </div>
            <div class="card text-center">
                <div class="text-3xl font-bold text-purple-600" id="totalBids">-</div>
                <div class="text-gray-600">Bids Placed</div>
            </div>
            <div class="card text-center">
                <div class="text-3xl font-bold text-yellow-600" id="auctionsWon">-</div>
                <div class="text-gray-600">Auctions Won</div>
            </div>
        </div>

        <!-- Filters and Controls -->
        <div class="card mb-6">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div class="flex gap-4">
                    <select id="statusFilter" class="px-3 py-2 border border-gray-300 rounded-md">
                        <option value="all">All Auctions</option>
                        <option value="active">Active</option>
                        <option value="closed">Closed</option>
                        <option value="pending">Pending</option>
                    </select>
                    <select id="sortBy" class="px-3 py-2 border border-gray-300 rounded-md">
                        <option value="created_at">Date Created</option>
                        <option value="end_time">End Time</option>
                        <option value="title">Title</option>
                        <option value="starting_bid">Starting Bid</option>
                    </select>
                    <select id="sortOrder" class="px-3 py-2 border border-gray-300 rounded-md">
                        <option value="DESC">Newest First</option>
                        <option value="ASC">Oldest First</option>
                    </select>
                </div>
                <div class="text-sm text-gray-600">
                    Showing <span id="showingCount">0</span> auctions
                </div>
            </div>
        </div>

        <!-- Auctions Grid -->
        <div class="grid md-grid-cols-2 lg-grid-cols-3 gap-6 mb-6">
            <div id="auctionsGrid" class="contents">
                <!-- Auction cards will be populated here -->
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center gap-2 mb-6" style="display: none;">
            <button id="prevPage" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 disabled:opacity-50" disabled>
                Previous
            </button>
            <span id="pageInfo" class="px-4 py-2 text-gray-700">Page 1</span>
            <button id="nextPage" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 disabled:opacity-50" disabled>
                Next
            </button>
        </div>

        <!-- Activity Feed and Active Bids -->
        <div class="grid md-grid-cols-2 gap-6">
            <!-- Activity Feed -->
            <div class="card">
                <h3 class="text-lg font-semibold mb-4">Recent Activity</h3>
                <div id="activityFeed" class="activity-feed">
                    <!-- Activity items will be populated here -->
                </div>
            </div>

            <!-- Active Bids -->
            <div class="card">
                <h3 class="text-lg font-semibold mb-4">My Active Bids</h3>
                <div id="activeBids" class="space-y-3">
                    <!-- Active bid items will be populated here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg p-6 flex flex-col items-center">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-700">Loading dashboard...</p>
        </div>
    </div>

    <script src="dashboard.js"></script>
    
    <!-- ARIA Live Regions -->
    <div id="aria-live-polite" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="aria-live-assertive" role="alert" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
</body>
</html>
