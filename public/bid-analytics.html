<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid History Analytics - Sealed Auction Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/stellar-sdk@11.0.0/dist/stellar-sdk.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Accessibility Styles -->
    <link rel="stylesheet" href="accessibility.css">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-tertiary: #718096;
            --border-color: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --gradient-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --stellar-gradient: linear-gradient(135deg, #f7fafc 0%, #edf2f7 50%, #e2e8f0 100%);
            --button-primary: #667eea;
            --button-primary-hover: #5a67d8;
            --button-secondary: #718096;
            --button-secondary-hover: #4a5568;
        }

        [data-theme="dark"] {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #4a5568;
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-tertiary: #a0aec0;
            --border-color: #4a5568;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --gradient-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --stellar-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --button-primary: #9f7aea;
            --button-primary-hover: #805ad5;
            --button-secondary: #4a5568;
            --button-secondary-hover: #2d3748;
        }

        .gradient-bg {
            background: var(--gradient-bg);
        }
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stellar-gradient {
            background: var(--stellar-gradient);
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        .spinner-lg {
            width: 40px;
            height: 40px;
            border-width: 4px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 25%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .timeline-item {
            position: relative;
            padding-left: 40px;
            margin-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 9px;
            top: 0;
            bottom: -20px;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            z-index: 1;
        }

        .timeline-dot.won {
            background: #10b981;
        }

        .timeline-dot.lost {
            background: #ef4444;
        }

        .timeline-dot.pending {
            background: #f59e0b;
        }

        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .timeline-item {
                padding-left: 30px;
            }
            
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Skip Navigation Link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Header -->
    <header role="banner" class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-chart-line text-2xl" aria-hidden="true"></i>
                    <h1 class="text-2xl font-bold">Bid History Analytics</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="exportData('json')" class="bg-white text-purple-600 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-download mr-2" aria-hidden="true"></i>Export JSON
                    </button>
                    <button onclick="exportData('csv')" class="bg-white text-purple-600 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-file-csv mr-2" aria-hidden="true"></i>Export CSV
                    </button>
                    <a href="index.html" class="bg-purple-700 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">
                        <i class="fas fa-arrow-left mr-2" aria-hidden="true"></i>Back
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" role="main" class="container mx-auto px-4 py-8">
        <!-- Filters Section -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Filters</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="statusFilter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="closed">Closed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date From</label>
                    <input type="date" id="dateFromFilter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date To</label>
                    <input type="date" id="dateToFilter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sort By</label>
                    <select id="sortByFilter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="timestamp">Date</option>
                        <option value="amount">Amount</option>
                        <option value="auction_title">Auction Title</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="applyFilters()" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition">
                    <i class="fas fa-filter mr-2" aria-hidden="true"></i>Apply Filters
                </button>
                <button onclick="resetFilters()" class="ml-2 bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">
                    <i class="fas fa-undo mr-2" aria-hidden="true"></i>Reset
                </button>
            </div>
        </section>

        <!-- Statistics Cards -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Bids</p>
                        <p class="text-2xl font-bold text-gray-800" id="totalBids">-</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i class="fas fa-gavel text-purple-600 text-xl" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Spent</p>
                        <p class="text-2xl font-bold text-gray-800" id="totalSpent">-</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fas fa-dollar-sign text-green-600 text-xl" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Won Auctions</p>
                        <p class="text-2xl font-bold text-gray-800" id="wonAuctions">-</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fas fa-trophy text-blue-600 text-xl" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Win Rate</p>
                        <p class="text-2xl font-bold text-gray-800" id="winRate">-</p>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <i class="fas fa-percentage text-yellow-600 text-xl" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">Spending Analytics</h3>
                <div class="chart-container">
                    <canvas id="spendingChart"></canvas>
                </div>
                <div class="mt-4 flex justify-center space-x-4">
                    <button onclick="updateSpendingChart('daily')" class="px-3 py-1 bg-purple-100 text-purple-700 rounded hover:bg-purple-200 transition">Daily</button>
                    <button onclick="updateSpendingChart('weekly')" class="px-3 py-1 bg-purple-100 text-purple-700 rounded hover:bg-purple-200 transition">Weekly</button>
                    <button onclick="updateSpendingChart('monthly')" class="px-3 py-1 bg-purple-600 text-white rounded hover:bg-purple-700 transition">Monthly</button>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">Win/Loss Distribution</h3>
                <div class="chart-container">
                    <canvas id="winLossChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Competition Analysis -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4">Competition Analysis</h3>
            <div class="chart-container">
                <canvas id="competitionChart"></canvas>
            </div>
        </section>

        <!-- Timeline View -->
        <section class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold mb-4">Bid Timeline</h3>
            <div id="timelineContainer" class="space-y-4">
                <div class="text-center py-8">
                    <div class="spinner-lg mx-auto mb-4"></div>
                    <p class="text-gray-500">Loading timeline data...</p>
                </div>
            </div>
            <div class="mt-6 text-center">
                <button onclick="loadMoreTimeline()" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition">
                    <i class="fas fa-plus mr-2" aria-hidden="true"></i>Load More
                </button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-16">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Sealed Auction Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="bid-analytics.js"></script>
    
    <!-- ARIA Live Regions -->
    <div id="aria-live-polite" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="aria-live-assertive" role="alert" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
    
    <!-- Accessibility JavaScript -->
    <script src="accessibility.js"></script>
</body>
</html>
