<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private-Input Sealed-Bid Auction - Stellar Blockchain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/stellar-sdk@11.0.0/dist/stellar-sdk.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Light theme colors */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-tertiary: #718096;
            --border-color: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --gradient-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --stellar-gradient: linear-gradient(135deg, #f7fafc 0%, #edf2f7 50%, #e2e8f0 100%);
            --button-primary: #667eea;
            --button-primary-hover: #5a67d8;
            --button-secondary: #718096;
            --button-secondary-hover: #4a5568;
        }

        [data-theme="dark"] {
            /* Dark theme colors */
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #4a5568;
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-tertiary: #a0aec0;
            --border-color: #4a5568;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --gradient-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --stellar-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --button-primary: #9f7aea;
            --button-primary-hover: #805ad5;
            --button-secondary: #4a5568;
            --button-secondary-hover: #2d3748;
        }

        .gradient-bg {
            background: var(--gradient-bg);
        }
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stellar-gradient {
            background: var(--stellar-gradient);
        }
        
        /* Loading spinner styles */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        .spinner-lg {
            width: 40px;
            height: 40px;
            border-width: 4px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Skeleton loader styles */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 25%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
        }
        
        .skeleton-text {
            height: 16px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        
        .skeleton-text.title {
            height: 24px;
            width: 60%;
        }
        
        .skeleton-text.large {
            height: 20px;
            width: 80%;
        }
        
        .skeleton-text.small {
            height: 14px;
            width: 40%;
        }
        
        .skeleton-button {
            height: 40px;
            border-radius: 8px;
            width: 100%;
            margin-top: 16px;
        }
        
        /* Loading overlay styles */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        /* Theme toggle styles */
        .theme-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background: var(--button-secondary);
            border-radius: 15px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--button-secondary-hover);
        }

        .theme-toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [data-theme="dark"] .theme-toggle-slider {
            transform: translateX(30px);
        }

        .theme-toggle-slider i {
            font-size: 12px;
            color: var(--text-primary);
        }

        /* Form input styles */
        .form-input {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .form-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--button-primary);
        }

        .btn-primary {
            background: var(--button-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--button-primary-hover);
        }

        .btn-secondary {
            background: var(--button-secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--button-secondary-hover);
        }

        .text-primary {
            color: var(--text-primary);
        }

        .text-secondary {
            color: var(--text-secondary);
        }

        .text-secondary:hover {
            color: var(--text-primary);
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .loading-content .spinner {
            margin: 0 auto 16px;
        }
        
        /* Button loading state */
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        /* Validation styles */
        .error-message {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Input validation states */
        input.error, textarea.error {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.1) !important;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        input.valid, textarea.valid {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
        }
        
        /* Form field focus states */
        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.3);
            transition: all 0.3s ease;
        }
        
        input.error:focus, textarea.error:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3);
        }
        
        input.valid:focus, textarea.valid:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
        }
        
        /* Button disabled state */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        button:disabled:hover {
            transform: none !important;
        }
        
        /* Loading spinner for validation */
        .validation-loading {
            position: relative;
        }
        
        .validation-loading::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-clamp: 3;
            display: -moz-box;
            -moz-line-clamp: 3;
            -moz-box-orient: vertical;
        }
        @media (max-width: 640px) {
            .truncate-mobile {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .auction-card-mobile {
                min-height: 280px;
            }
            .mobile-overflow-hidden {
                overflow: hidden;
            }
        }
        @media (max-width: 768px) {
            .md-flex-col {
                flex-direction: column;
            }
            .md-w-full {
                width: 100%;
            }
        }
    </style>
</head>

    <script src="app.js"></script>
</body>
</html>
